apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - sandbox-demo.yaml
  - sandbox-otel-demo.yaml

# Strategic-merge patch: adds OTEL env vars to the elicitation-mcp-server
# deployment so it sends traces to Phoenix.
# See mcp-tracing-patch.yaml for the code changes needed in the MCP server image.
patches:
  - path: mcp-tracing-patch.yaml
    target:
      kind: Deployment
      name: elicitation-mcp-server
      namespace: mcp
