# Lab 5 — Composing Agent Sandbox with Network Policies via KRO
# Docs: https://agent-sandbox.sigs.k8s.io/docs/use-cases/examples/network-policies/
#
# Architecture:
#   AgenticSandbox (custom) ──KRO──► Sandbox + Service + NetworkPolicy (optional) + Ingress (optional)
#
# ResourceGraphDefinition defines the composite resource "AgenticSandbox"
# in the custom.agents.x-k8s.io group.  KRO reconciles each AgenticSandbox
# instance into the constituent Kubernetes resources.
#
# Demo instance below creates:
#   - Sandbox:        runs nginx
#   - Service:        ClusterIP on port 80
#   - NetworkPolicy:  allows ingress from pods labelled app=frontend and
#                     from namespaces labelled lab=lab5;
#                     allows egress to kube-dns (port 53) only
#
# Apply:   make nw-policy-demo-apply
# Status:  make nw-policy-demo-status
# Cleanup: make nw-policy-demo-clean
---
# Namespace for the demo sandbox
apiVersion: v1
kind: Namespace
metadata:
  name: sandboxes-nw
  labels:
    lab: lab5

---

# ResourceGraphDefinition: declares the AgenticSandbox composite resource.
# KRO reconciles each instance into Sandbox + Service + NetworkPolicy + Ingress.
# Source: https://github.com/kubernetes-sigs/agent-sandbox/blob/main/examples/composing-sandbox-nw-policies/rgd.yaml
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: agentic-sandbox
  namespace: sandboxes-nw
spec:
  schema:
    apiVersion: v1alpha1
    group: custom.agents.x-k8s.io
    kind: AgenticSandbox
    types:
      egressRule: object
    spec:
      image: string | default="nginx"
      service:
        port: integer | default=80
      networkPolicy:
        enabled: boolean | default=false
        ingress:
          podLabels: "map[string]string"
          namespaceLabels: "map[string]string"
        egress: "[]egressRule"
      ingress:
        enabled: boolean | default=false
    status:
      fqdn: ${service.metadata.name}.${service.metadata.namespace}.svc.cluster.local
      sandboxConditions: ${sandbox.status.conditions}
  graph:
  resources:
    - id: sandbox
      readyWhen:
      - ${sandbox.status.conditions.exists(x, x.type == 'Ready' && x.status == "True")}
      template:
        apiVersion: agents.x-k8s.io/v1alpha1
        kind: Sandbox
        metadata:
          name: ${schema.metadata.name}
        spec:
          podTemplate:
            metadata:
              labels:
                sandbox: ${schema.metadata.name}
            spec:
              containers:
                - name: sandbox
                  image: ${schema.spec.image}
                  ports:
                    - containerPort: ${schema.spec.service.port}
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}-lb
        spec:
          selector:
            sandbox: ${schema.metadata.name}
          ports:
            - protocol: TCP
              port: ${schema.spec.service.port}
              targetPort: ${schema.spec.service.port}
    - id: nwpolicy
      includeWhen:
        - ${schema.spec.networkPolicy.enabled}
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-frontend-to-backend
          namespace: sandboxes-nw
        spec:
          podSelector:
            matchLabels:
              sandbox: ${schema.metadata.name}
          policyTypes:
            - Ingress
            - Egress
          ingress:
          - from:
            - podSelector:
                matchLabels: ${schema.spec.networkPolicy.ingress.podLabels}
            - namespaceSelector:
                matchLabels: ${schema.spec.networkPolicy.ingress.namespaceLabels}
          egress: ${schema.spec.networkPolicy.egress}
    - id: ingress
      includeWhen:
        - ${schema.spec.ingress.enabled}
      template:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: ${schema.metadata.name}
        spec:
          defaultBackend:
            service:
              name: ${service.metadata.name}
              port:
                number: ${schema.spec.service.port}

---

# Demo AgenticSandbox instance.
# KRO will create: Sandbox (nginx) + Service + NetworkPolicy
#
# NetworkPolicy details:
#   Ingress: only pods with label app=frontend OR namespaces with label lab=lab5
#   Egress:  only to kube-dns (port 53/UDP+TCP) — no outbound internet access
apiVersion: custom.agents.x-k8s.io/v1alpha1
kind: AgenticSandbox
metadata:
  name: demo
  namespace: sandboxes-nw
spec:
  image: nginx:stable-alpine
  service:
    port: 80
  networkPolicy:
    enabled: true
    ingress:
      podLabels:
        app: frontend
      namespaceLabels:
        lab: lab5
    egress:
    # Allow DNS resolution only (kube-dns in kube-system namespace)
    - ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53
