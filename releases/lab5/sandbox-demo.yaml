# Lab 5 — Agent Sandbox Demo Resources
# Demonstrates:
#   1. SandboxTemplate  — reusable pod template for agent workloads
#   2. SandboxClaim     — user-facing claim that provisions a Sandbox from a template
#   3. Sandbox          — direct singleton stateful workload (for reference)
#
# Namespace for all sandbox demo workloads
---
apiVersion: v1
kind: Namespace
metadata:
  name: sandboxes
  labels:
    app.kubernetes.io/part-of: lab5

---

# SandboxTemplate — base template for Python agent runtimes
# Agents provisioned from this template get:
#   - a persistent home volume (2 Gi)
#   - OTEL env vars wired to Phoenix for traces/metrics
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: python-agent
  namespace: sandboxes
spec:
  podTemplate:
    spec:
      containers:
      - name: agent
        image: python:3.12-slim
        command: ["sleep", "infinity"]
        env:
        # OpenTelemetry — send traces and metrics to Arize Phoenix
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://phoenix.phoenix.svc.cluster.local:6006"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_SERVICE_NAME
          value: "agent-sandbox-demo"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "otlp"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      restartPolicy: Always
  volumeClaimTemplates:
  - metadata:
      name: agent-home
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi

---

# SandboxClaim — provisions a Sandbox from the python-agent template.
# The controller creates a Sandbox and binds it to this claim.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxClaim
metadata:
  name: demo-agent-claim
  namespace: sandboxes
spec:
  sandboxTemplateRef:
    name: python-agent
