# Arize Phoenix — LLM Observability & Tracing Platform
# Chart: oci://registry-1.docker.io/arizephoenix/phoenix-helm v8.0.0
# UI:   http://localhost:6006 (make phoenix-ui)
# OTLP: http://phoenix-svc.phoenix.svc.cluster.local:6006/v1/traces  (HTTP)
#       http://phoenix-svc.phoenix.svc.cluster.local:4317              (gRPC)
# Docs: https://arize.com/docs/phoenix/self-hosting/deployment-options/kubernetes-helm
---
apiVersion: v1
kind: Namespace
metadata:
  name: phoenix
  labels:
    app.kubernetes.io/name: phoenix

---

apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: phoenix
  namespace: flux-system
spec:
  interval: 1h
  url: oci://registry-1.docker.io/arizephoenix/phoenix-helm
  ref:
    tag: "8.0.0"

---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: phoenix
spec:
  interval: 1h
  releaseName: phoenix
  chartRef:
    kind: OCIRepository
    name: phoenix
    namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: true
  values:
    server:
      port: 6006
    # SQLite persistence strategy (mutually exclusive with postgresql.enabled=true).
    # Stores trace data in a PVC backed by the cluster's default storage class.
    persistence:
      enabled: true
      size: 2Gi
    postgresql:
      enabled: false
    # DEMO ONLY — authentication disabled for local lab convenience.
    # Enable auth and set a strong password before exposing Phoenix externally.
    # PHOENIX_SECRET must contain at least one digit (Phoenix startup validation),
    # so we pin an explicit value here to prevent Helm from auto-generating an
    # all-alpha string that fails the check.
    auth:
      enableAuth: false
      secret:
        - key: "PHOENIX_SECRET"
          value: "ZWLLEXTOKVFljbACgWjj1xFWAjofZYDh"
