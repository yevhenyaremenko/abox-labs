# KRO — Kubernetes Resource Orchestrator
# Chart: oci://registry.k8s.io/kro/charts/kro v0.9.2
# Docs:  https://kro.run/
#
# KRO lets you declare composite Kubernetes resources via a
# ResourceGraphDefinition.  Used in Lab 5 to compose Sandbox +
# Service + NetworkPolicy into a single AgenticSandbox abstraction.
# See releases/lab5/network-policies.yaml for the RGD and demo instance.
---
apiVersion: v1
kind: Namespace
metadata:
  name: kro
  labels:
    app.kubernetes.io/name: kro

---

apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kro
  namespace: flux-system
spec:
  interval: 1h
  url: oci://registry.k8s.io/kro/charts/kro
  ref:
    tag: "0.9.2"

---

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: kro
spec:
  interval: 1h
  releaseName: kro
  chartRef:
    kind: OCIRepository
    name: kro
    namespace: flux-system
  install:
    createNamespace: true
    crds: Create
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
  values: {}
