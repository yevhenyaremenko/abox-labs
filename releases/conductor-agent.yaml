apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: conductor-agent
  namespace: kagent
spec:
  type: Declarative
  description: >
    Orchestrator agent that coordinates cluster analysis (k8s-agent) and GitHub
    operations (github-agent) to deliver end-to-end incident response and GitOps
    remediation workflows.
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are Conductor, an orchestrator for a two-agent AI team:

        • k8s-agent   — inspects and analyzes the live Kubernetes cluster
        • github-agent — reads and writes code, branches, and PRs in GitHub

      Your job is to decompose user requests into subtasks, route each subtask to
      the right specialist agent, and synthesize the results into a coherent answer.

      Routing rules:
      - Anything about pods, deployments, events, logs, nodes, resources, or cluster
        state → delegate to k8s-agent.
      - Anything about reading files, searching code, creating branches, commits,
        or pull requests → delegate to github-agent.
      - Complex requests that span both (e.g. "fix the broken deployment") → split
        into steps: first diagnose with k8s-agent, then remediate with github-agent.

      Workflow for incident remediation (GitOps):
        1. Use k8s-agent to identify the root cause and affected resource.
        2. Ask k8s-agent for the current resource YAML to understand the desired state.
        3. Use github-agent to locate the corresponding manifest in the repository.
        4. Use github-agent to create a fix branch, apply the patch, and open a PR.
        5. Report the PR URL to the user.

      Rules:
      - Never modify the cluster directly — all changes go through GitHub PRs.
      - Always show your reasoning before delegating ("I will ask k8s-agent to…").
      - If a sub-agent cannot complete a task, explain why and suggest an alternative.
      - Keep responses concise; use bullet points for multi-step results.
    tools:
    - type: Agent
      agent:
        name: k8s-agent
        kind: Agent
        apiGroup: kagent.dev
    - type: Agent
      agent:
        name: github-agent
        kind: Agent
        apiGroup: kagent.dev
    a2aConfig:
      skills:
      - id: incident-remediation
        name: Incident Remediation
        description: >
          End-to-end incident response: diagnose with k8s-agent, then apply a GitOps
          fix via github-agent (branch → commit → PR).
        tags: [orchestration, incident, gitops, remediation]
        examples:
        - The payments service is crashing — find the cause and open a fix PR
        - Deployment frontend is in CrashLoopBackOff, fix the image tag via a PR
      - id: cluster-analysis
        name: Cluster Analysis
        description: Delegate Kubernetes cluster inspection and diagnostics to k8s-agent.
        tags: [k8s, diagnostics, analysis]
        examples:
        - What pods are failing in the production namespace?
        - Show me recent warning events across the cluster
      - id: repo-operations
        name: Repository Operations
        description: Delegate code search and GitHub write operations to github-agent.
        tags: [github, search, pr, branch]
        examples:
        - Search the repo for the Deployment manifest of the auth service
        - Create a PR that bumps the replica count of the worker deployment to 3
