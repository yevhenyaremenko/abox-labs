apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry
---
# GitRepository source for the agentregistry-inventory Helm chart (hosted in GitHub)
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agentregistry-inventory
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/den-vasyliev/agentregistry-inventory
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  interval: 1h
  chart:
    spec:
      chart: ./charts/agentregistry
      sourceRef:
        kind: GitRepository
        name: agentregistry-inventory
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    disableAuth: true
