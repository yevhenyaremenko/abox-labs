apiVersion: v1
kind: Namespace
metadata:
  name: kagent
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/kagent-dev/kagent/helm/kagent
  ref:
    tag: "0.7.23"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 1h
  releaseName: kagent
  postRenderers:
  - kustomize:
      patches:
      - patch: |
          - op: add
            path: /metadata/labels/app.kubernetes.io~1version
            value: "0.7.23"
        target:
          labelSelector: app.kubernetes.io/name=kagent
  dependsOn:
    - name: kagent-crds
      namespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
    namespace: flux-system
  install:
    createNamespace: true
  values:
    controller:
      image:
        tag: 0.7.23
    tag: 0.7.23
    ui:
      image:
        tag: 0.7.23
    tools:
      querydoc:
        enabled: false
      grafana-mcp:
        enabled: false
    agents:
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
      istio-agent:
        enabled: false
      istio-policy-agent:
        enabled: false
      istio-manager-agent:
        enabled: false
      promql-agent:
        enabled: false
      argo-rollouts-conversion-agent:
        enabled: false
      observability-agent:
        enabled: false
    providers:
      default: openAI
      openAI:
        apiKey: OPENAI_API_KEY
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: kagent
  namespace: kagent
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: kagent
  to:
  - group: ""
    kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent
  namespace: kagent
spec:
  parentRefs:
  - name: agentgateway-external
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: kagent-controller
      namespace: kagent
      port: 8083
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kagent-ui
      namespace: kagent
      port: 8080
---
# ModelConfig.spec.apiKeySecret is required by the CRD, but kagent must not use
# the key directly — all traffic routes through agentgateway, which injects the
# real credential via AgentgatewayBackend auth policy. The placeholder secret
# satisfies the schema without exposing a real key to kagent.
---
apiVersion: v1
kind: Secret
metadata:
  name: kagent-openai-placeholder
  namespace: kagent
stringData:
  OPENAI_API_KEY: placeholder
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: agentgateway-openai
  namespace: kagent
spec:
  apiKeySecret: kagent-openai-placeholder
  apiKeySecretKey: OPENAI_API_KEY
  provider: OpenAI
  model: gpt-5.4-mini
  openAI:
    baseUrl: http://agentgateway-external.agentgateway-system.svc.cluster.local/v1beta/openai/openai
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: default-model-config
  namespace: kagent
spec:
  apiKeySecret: kagent-openai-placeholder
  apiKeySecretKey: OPENAI_API_KEY
  provider: OpenAI
  model: gpt-5.4-mini
  openAI:
    baseUrl: http://agentgateway-external.agentgateway-system.svc.cluster.local/v1beta/openai/openai
